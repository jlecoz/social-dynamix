<script>
(function() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');

  function resize() {
    const s = wrap.clientWidth;
    canvas.width = s;
    canvas.height = s;
  }
  resize();
  window.addEventListener('resize', resize);

  // Grid of squares matching the logo's staggered pattern
  // Each row is offset by half a cell (90-deg shift = alternating offset per row)
  const CELL = 22;
  const GAP = 4;
  const STEP = CELL + GAP;
  const COLS = 18;
  const ROWS = 18;

  // Spectrum color palette from the logo's blues/teals
  const palette = [
    [0, 23, 33],      // darkest bg
    [0, 38, 50],
    [0, 63, 82],
    [0, 87, 113],
    [14, 89, 90],
    [0, 122, 177],
    [14, 89, 90],
    [93, 171, 223],   // highlight blue
    [229, 243, 251],  // near-white
  ];

  function lerp(a, b, t) { return a + (b - a) * t; }

  function colorAt(intensity) {
    const scaled = intensity * (palette.length - 1);
    const lo = Math.floor(scaled);
    const hi = Math.min(lo + 1, palette.length - 1);
    const f = scaled - lo;
    const r = Math.round(lerp(palette[lo][0], palette[hi][0], f));
    const g = Math.round(lerp(palette[lo][1], palette[hi][1], f));
    const b = Math.round(lerp(palette[lo][2], palette[hi][2], f));
    return `rgb(${r},${g},${b})`;
  }

  let t = 0;
  function draw() {
    const W = canvas.width;
    const H = canvas.height;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#001721';
    ctx.fillRect(0, 0, W, H);

    const scale = W / 400;
    const cellS = CELL * scale;
    const gapS = GAP * scale;
    const stepS = STEP * scale;

    // Center the grid
    const gridW = COLS * stepS;
    const gridH = ROWS * stepS;
    const ox = (W - gridW) / 2;
    const oy = (H - gridH) / 2;

    for (let row = 0; row < ROWS; row++) {
      // 90-degree shift: every other row offset by half a cell
      const rowOffset = (row % 2 === 0) ? 0 : stepS * 0.5;

      for (let col = 0; col < COLS; col++) {
        const x = ox + col * stepS + rowOffset;
        const y = oy + row * stepS;

        // Spectrum wave: amplitude based on distance from center + time
        const cx = col / (COLS - 1) - 0.5;
        const cy = row / (ROWS - 1) - 0.5;
        const dist = Math.sqrt(cx * cx + cy * cy) * 2;

        // Wave propagating outward + secondary diagonal wave
        const wave1 = Math.sin(dist * 6 - t * 2.2) * 0.5 + 0.5;
        const wave2 = Math.sin((cx + cy) * 8 + t * 1.6) * 0.3 + 0.3;
        const wave3 = Math.sin((cx - cy) * 6 - t * 1.1) * 0.2 + 0.2;

        // Row-based spectrum: higher rows = different phase shift (the 90-deg effect)
        const rowPhase = (row % 2 === 0) ? 0 : Math.PI * 0.5;
        const specHeight = (Math.sin(col / COLS * Math.PI * 2.5 - t * 2.5 + rowPhase) * 0.5 + 0.5);

        const intensity = (wave1 * 0.45 + wave2 * 0.25 + wave3 * 0.15 + specHeight * 0.35);
        const clamped = Math.max(0, Math.min(1, intensity));

        // Only draw if within canvas bounds
        if (x + cellS < 0 || x > W || y + cellS < 0 || y > H) continue;

        ctx.fillStyle = colorAt(clamped);
        ctx.fillRect(x, y, cellS, gapS * 0.5);
        ctx.fillRect(x, y, gapS * 0.5, cellS);

        // Main square body
        const alpha = 0.18 + clamped * 0.82;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = colorAt(clamped);
        ctx.fillRect(x + gapS * 0.5, y + gapS * 0.5, cellS - gapS, cellS - gapS);
        ctx.globalAlpha = 1;
      }
    }

    t += 0.022;
    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
